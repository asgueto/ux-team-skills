name: Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'skills.json'
      - 'README.md'
      - '.github/workflows/skills.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate skill structure
        run: npm run validate

      - name: Regenerate manifest and README tables
        run: npm run generate-manifest

      - name: Commit auto-generated updates
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet skills.json README.md; then
            echo "No manifest changes needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills.json README.md
          git commit -m "chore: update skills manifest and README tables"
          git push
