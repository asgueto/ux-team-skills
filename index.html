<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, #0d46ca 0%, #1e293b 100%);
        color: #f8fafc;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2.5rem, 8vw, 4rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        font-size: 1.125rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, World!</h1>
      <p>Welcome to your first page.</p>
    </main>
  </body>
</html>
